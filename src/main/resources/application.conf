# Base application configuration
app {
  environment = "production"
  environment = ${?APP_ENV}
}

http {
  host = "0.0.0.0"
  host = ${?HTTP_HOST}
  port = 8080
  port = ${?HTTP_PORT}
}

db {
  driver = "org.postgresql.Driver"
  driver = ${?DB_DRIVER}
  url = "jdbc:postgresql://localhost:5432/metropolis"
  url = ${?DB_URL}
  user = "postgres"
  user = ${?DB_USER}
  password = "password"
  password = ${?DB_PASSWORD}
  num-threads = 10
  num-threads = ${?DB_NUM_THREADS}
}
