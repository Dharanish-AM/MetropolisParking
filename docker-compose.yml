services:
  database:
    image: postgres:15-alpine
    container_name: metropolis-parking-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=metropolis
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d metropolis"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: metropolis-parking-backend:latest
    container_name: metropolis-parking-service
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - HTTP_HOST=0.0.0.0
      - HTTP_PORT=8080
      - DB_URL=jdbc:postgresql://database:5432/metropolis
      - DB_USER=postgres
      - DB_PASSWORD=password
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  pgdata:
