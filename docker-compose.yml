version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: metropolis-db
    environment:
      POSTGRES_DB: metropolis_parking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d metropolis_parking"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: metropolis-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/metropolis_parking
      DB_USERNAME: postgres
      DB_PASSWORD: password
      JWT_SECRET: super-secret-key-change-in-production
    ports:
      - "8080:8080"

volumes:
  postgres_data:
