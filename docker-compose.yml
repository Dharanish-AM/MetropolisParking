version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: metropolis-parking-backend:latest
    container_name: metropolis-parking-service
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - HTTP_HOST=0.0.0.0
      - HTTP_PORT=8080
    restart: unless-stopped
